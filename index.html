<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waymark B1.1 — 9. Sınıf İngilizce</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--border:#e2e6ea;--text:#212529;--muted:#6c757d;--r:12px;--sh:0 2px 8px rgba(0,0,0,.08)}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

.hdr{background:#1a1d23;color:#fff;text-align:center;padding:32px 20px 28px}
.hdr .badge{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.hdr h1{font-size:clamp(20px,5vw,34px);font-weight:900;line-height:1.2;margin-bottom:10px}
.hdr h1 span{color:#ffc107}
.hdr p{font-size:13px;color:rgba(255,255,255,.5);max-width:420px;margin:0 auto 22px;line-height:1.6}
.hdr-stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.hdr-stats .sv{font-size:26px;font-weight:900;color:#ffc107;display:block;line-height:1}
.hdr-stats .sl{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;display:block}

.wrap{max-width:920px;margin:0 auto;padding:0 14px}

/* SEARCH */
.srch-area{padding:18px 0 0}
.srch-box{position:relative}
.srch-box svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.srch-box input{width:100%;padding:12px 14px 12px 40px;border:2px solid var(--border);border-radius:var(--r);background:var(--card);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);outline:none;transition:border-color .2s;box-shadow:var(--sh)}
.srch-box input:focus{border-color:#1a1d23}
.srch-box input::placeholder{color:#adb5bd;font-weight:400}
.srch-hint{font-size:11px;color:var(--muted);margin-top:5px;padding-left:2px}

/* THEME NAV */
.tnav{padding:14px 0 0}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
@media(min-width:480px){.tgrid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:680px){.tgrid{grid-template-columns:repeat(9,1fr)}}
.tbtn{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:10px 5px;cursor:pointer;text-align:center;transition:all .18s;font-family:'Nunito',sans-serif}
.tbtn:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.tbtn .tn{font-size:12px;font-weight:900;display:block;line-height:1}
.tbtn .tt{font-size:9px;font-weight:700;margin-top:3px;display:block;color:var(--muted);line-height:1.3}
.tbtn .tc{font-size:8px;margin-top:2px;display:block;color:#adb5bd}
.tbtn.active{color:#fff;border-color:transparent}
.tbtn.active .tt,.tbtn.active .tc{color:rgba(255,255,255,.7)}

/* CONTENT */
.content{padding:14px 0 80px}
.unit{display:none}
.unit.active{display:block;animation:fadeUp .25s ease}

/* BANNER */
.banner{border-radius:var(--r);padding:20px 18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.banner-bg{position:absolute;right:-8px;top:-8px;font-size:72px;font-weight:900;opacity:.07;line-height:1;pointer-events:none;user-select:none}
.btag{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.btitle{font-size:20px;font-weight:900;margin-bottom:3px;line-height:1.2}
.bdesc{font-size:12px;opacity:.65;line-height:1.5}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.usrch{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .2s}
.usrch:focus{border-color:#1a1d23}
.usrch::placeholder{color:#ced4da;font-weight:400}
.cpill{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;flex-shrink:0}
.cpill b{color:var(--text)}

/* WORD GRID */
.wgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
@media(min-width:440px){.wgrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:640px){.wgrid{grid-template-columns:repeat(4,1fr)}}

/* WORD CARD */
.wcard{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s}
.wcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.wen-block{padding:11px 12px 9px;display:flex;justify-content:space-between;align-items:flex-start;gap:5px}
.wen{font-size:13px;font-weight:900;line-height:1.3;flex:1;color:var(--text)}
.wtype{font-size:9px;color:var(--muted);font-style:italic;margin-top:2px}
.spkbtn{flex-shrink:0;width:24px;height:24px;border:1.5px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0;margin-top:1px}
.wcard:hover .spkbtn{opacity:1}
.spkbtn:hover{background:#1a1d23;border-color:#1a1d23;color:#fff}
.wtr-block{padding:8px 12px 10px;border-top:1.5px solid var(--border)}
.wtr{font-size:12px;font-weight:800;line-height:1.4}

/* NO RESULTS */
.nores{display:none;text-align:center;padding:32px;color:var(--muted);font-size:13px}

/* GLOBAL PANEL */
.gpanel{display:none}
.gpanel.show{display:block;animation:fadeUp .25s ease}
.ginfo{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:700}
.ginfo b{color:var(--text)}
.gtlbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 8px;padding:5px 10px;border-radius:5px;display:inline-block;color:#fff}

/* TRANSLATE */
.trbox{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px}
.trbox h3{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.trrow{display:flex;gap:7px;margin-bottom:9px}
.trinp{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .2s}
.trinp:focus{border-color:#1a1d23}
.trbtn{background:#1a1d23;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.trbtn:hover{opacity:.8}
.trres{display:none;padding:11px 13px;background:var(--bg);border-radius:9px;font-size:13px;line-height:1.6;font-weight:600}
.trres.show{display:block}
.trlinks{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.trlinks a{color:#0077b6;font-weight:700;text-decoration:none;margin-left:5px}
.tr-dir-row{display:flex;gap:8px;flex-wrap:wrap}
.tr-dir-btn{flex:1;min-width:120px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center}
.tr-dir-btn:hover{border-color:#1a1d23;color:#1a1d23}
.tr-dir-btn.active{background:#1a1d23;border-color:#1a1d23;color:#fff}
/* Two-panel layout */
.tr-panels{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:start}
.tr-panel{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.tr-panel-lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 14px 6px}
.tr-area{width:100%;padding:6px 14px 10px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text);outline:none;resize:none;min-height:80px;line-height:1.5}
.tr-area-result{padding:6px 14px 10px;font-size:15px;font-weight:800;color:#2e7d32;min-height:80px;line-height:1.5;word-break:break-word}
.spk-panel-btn{margin:0 10px 10px;align-self:flex-start;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all .15s}
.spk-panel-btn:hover{background:#1a1d23;color:#fff;border-color:#1a1d23}
.tr-arrow{font-size:20px;color:var(--muted);padding-top:42px;text-align:center;user-select:none}
.tr-status{margin-top:8px;min-height:20px;font-size:11px}
@media(max-width:480px){
  .tr-panels{grid-template-columns:1fr;gap:8px}
  .tr-arrow{padding-top:0;font-size:16px}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

/* SPEAK */
function spk(w){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.85;
  window.speechSynthesis.speak(u);
}

/* SWITCH */
function sw(i){
  document.getElementById('gs').value='';
  document.getElementById('gpanel').classList.remove('show');
  secs[cur].classList.remove('active');
  secs[i].classList.add('active');
  cur=i;
  const btns=document.querySelectorAll('.tbtn');
  btns.forEach((b,idx)=>{b.classList.remove('active');b.style.background='';b.style.borderColor='';});
  btns[i].classList.add('active');
  const c=i<8?T[i].c:'#1a1d23';
  btns[i].style.background=c;btns[i].style.borderColor=c;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* FILTER */
function filt(i,q){
  q=q.toLowerCase().trim();
  const cards=document.getElementById('wg-'+i).querySelectorAll('.wcard');
  let v=0;
  cards.forEach(c=>{const m=!q||c.dataset.e.includes(q)||c.dataset.t.includes(q);c.style.display=m?'':'none';if(m)v++;});
  document.getElementById('cp-'+i).innerHTML=q?`<b>${v}</b>/${T[i].words.length}`:`<b>${T[i].words.length}</b> kelime`;
  document.getElementById('nr-'+i).style.display=v===0?'block':'none';
}

/* GLOBAL SEARCH */
function gSearch(q){
  q=q.toLowerCase().trim();
  const panel=document.getElementById('gpanel');
  const info=document.getElementById('ginfo');
  const body=document.getElementById('gbody');
  if(!q){panel.classList.remove('show');secs[cur].classList.add('active');return;}
  secs.forEach(s=>s.classList.remove('active'));
  const res=T.map((th,i)=>({th,i,words:th.words.filter(w=>w[0].toLowerCase().includes(q)||w[1].toLowerCase().includes(q))})).filter(r=>r.words.length>0);
  const tot=res.reduce((s,r)=>s+r.words.length,0);
  if(res.length===0){
    info.innerHTML=`"<b>${q}</b>" için sonuç bulunamadı`;
    body.innerHTML=`<div class="nores" style="display:block">Kitapta bu kelime yok. <a href="#" onclick="sw(8);return false" style="color:#0077b6">Çeviri bölümüne git →</a></div>`;
    panel.classList.add('show');return;
  }
  info.innerHTML=`"<b>${q}</b>" için <b>${tot}</b> sonuç`;
  let html='';
  res.forEach(r=>{
    html+=`<div><span class="gtlbl" style="background:${r.th.c}">${r.th.n} · ${r.th.title}</span></div><div class="wgrid" style="margin-bottom:14px">`;
    r.words.forEach(w=>{html+=`<div class="wcard" style="border-top:3px solid ${r.th.c}"><div class="wen-block"><div><div class="wen">${w[0]}</div><div class="wtype">${w[2]}</div></div><button class="spkbtn" onclick="spk('${w[0].replace(/'/g,"\\'")}')">🔊</button></div><div class="wtr-block" style="background:${r.th.bg}20"><div class="wtr" style="color:${r.th.c}">${w[1]}</div></div></div>`;});
    html+='</div>';
  });
  body.innerHTML=html;
  panel.classList.add('show');
}

/* TRANSLATE DIRECTION */
let trDir = 'en';
let trTimer = null;
let lastResult = '';
let lastInp = '';

function setDir(d){
  trDir = d;
  document.getElementById('dir-en').classList.toggle('active', d==='en');
  document.getElementById('dir-tr').classList.toggle('active', d==='tr');
  document.getElementById('lbl-from').textContent = d==='en' ? 'İngilizce' : 'Türkçe';
  document.getElementById('lbl-to').textContent   = d==='en' ? 'Türkçe'    : 'İngilizce';
  document.getElementById('trinp').placeholder    = d==='en' ? 'İngilizce kelime yaz...' : 'Türkçe kelime yaz...';
  document.getElementById('trres').textContent    = '—';
  document.getElementById('tr-status').innerHTML  = '';
  document.getElementById('trinp').value = '';
  document.getElementById('trinp').focus();
  lastResult = ''; lastInp = '';
}

function spkFrom(){ spk(document.getElementById('trinp').value.trim()); }
function spkTo(){
  if(!lastResult) return;
  window.speechSynthesis && window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(lastResult);
  u.lang = trDir === 'en' ? 'tr-TR' : 'en-US';
  u.rate = 0.85;
  window.speechSynthesis && window.speechSynthesis.speak(u);
}

function doTrLive(){
  clearTimeout(trTimer);
  const val = document.getElementById('trinp').value.trim();
  if(!val){
    document.getElementById('trres').textContent = '—';
    document.getElementById('tr-status').innerHTML = '';
    lastResult = ''; lastInp = '';
    return;
  }
  trTimer = setTimeout(doTr, 500);
}

function doTr(){
  const inp = document.getElementById('trinp').value.trim();
  const resEl = document.getElementById('trres');
  const status = document.getElementById('tr-status');
  if(!inp || inp === lastInp) return;
  lastInp = inp;

  const sl = trDir === 'en' ? 'en' : 'tr';
  const tl = trDir === 'en' ? 'tr' : 'en';

  // 1. Kitapta ara
  let found = null;
  if(trDir === 'en'){
    outer: for(const th of T){
      for(const w of th.words){
        if(w[0].toLowerCase() === inp.toLowerCase()){
          found = {result: w[1], info: th.tag + ' · ' + th.title};
          break outer;
        }
      }
    }
  } else {
    outer: for(const th of T){
      for(const w of th.words){
        if(w[1].toLowerCase() === inp.toLowerCase()){
          found = {result: w[0], info: th.tag + ' · ' + th.title};
          break outer;
        }
      }
    }
  }

  if(found){
    resEl.textContent = found.result;
    lastResult = found.result;
    status.innerHTML = `<span style="color:#2d6a4f;font-size:12px;font-weight:800">✅ Kitapta var — ${found.info}</span>`;
    return;
  }

  // 2. Kitapta yok — JSONP ile Google Translate
  resEl.textContent = '...';
  status.innerHTML = `<span style="color:#c05621;font-size:12px;font-weight:800">📖 Kitapta yok — çevriliyor...</span>`;

  const cbName = '_gtcb_' + Date.now();
  let done = false;
  const script = document.createElement('script');

  const timer = setTimeout(function(){
    if(done) return;
    done = true;
    cleanup();
    showFallback(inp, sl, tl, resEl, status);
  }, 4000);

  function cleanup(){
    clearTimeout(timer);
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
  }

  window[cbName] = function(data){
    if(done) return;
    done = true;
    cleanup();
    try{
      const t = data[0].map(function(p){ return p[0]||''; }).join('').trim();
      if(t && t.toLowerCase() !== inp.toLowerCase()){
        resEl.textContent = t;
        lastResult = t;
        status.innerHTML = `<span style="color:#c05621;font-size:12px;font-weight:800">📖 Kitapta yok</span>`;
      } else {
        showFallback(inp, sl, tl, resEl, status);
      }
    } catch(e){
      showFallback(inp, sl, tl, resEl, status);
    }
  };

  script.onerror = function(){
    if(done) return;
    done = true;
    cleanup();
    showFallback(inp, sl, tl, resEl, status);
  };

  script.src = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl='
    + sl + '&tl=' + tl + '&dt=t&q=' + encodeURIComponent(inp) + '&cb=' + cbName;
  document.head.appendChild(script);
}

function showFallback(inp, sl, tl, resEl, status){
  lastResult = "";
  var gLink = "https://translate.google.com/?sl=" + sl + "&tl=" + tl + "&text=" + encodeURIComponent(inp) + "&op=translate";
  var a = document.createElement("a");
  a.href = gLink;
  a.target = "_blank";
  a.textContent = "Google Translate'ta Ac";
  a.style.cssText = "color:#0077b6;font-weight:800;font-size:14px";
  resEl.textContent = "";
  resEl.appendChild(a);
  status.innerHTML = "<span style='color:#c05621;font-size:12px;font-weight:800'>Kitapta yok</span>";
}
</script>
